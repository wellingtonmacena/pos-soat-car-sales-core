services:
  postgres02:
    image: postgres:16-alpine
    container_name: pos-soat-car-sales-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_sales_core
    ports:
      - "5433:5432"
    volumes:
      - postgres_data02:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_sales_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-soat-car-sales-core-app
    restart: unless-stopped
    depends_on:
      postgres02:
        condition: service_healthy
    environment:
      DB_HOST: postgres02
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: car_sales_core
      PORT: 3000
      # Hostname of the sibling car-sales service's container on the shared
      # car-sales-net network. Must match the service name/alias that repo
      # exposes on that same external network.
      CAR_SALES_SERVICE_URL: http://car-sales-app:3000
    ports:
      - "3000:3000"
    networks:
      - default
      - car-sales-net

volumes:
  postgres_data02:

networks:
  default:
  car-sales-net:
    external: true
